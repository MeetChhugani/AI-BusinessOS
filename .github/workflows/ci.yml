name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ai_businessos_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov pytest-asyncio httpx -r backend/requirements.txt

      - name: Run Ruff Lint & Format Checks
        run: |
          ruff check backend/
          ruff format --check backend/

      - name: Run Backend Tests with Coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@localhost:5432/ai_businessos_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: testing
          JWT_SECRET_KEY: test_secret_key_must_be_long_enough_for_security
          JWT_REFRESH_SECRET_KEY: test_refresh_secret_key_must_be_long_enough_for_security
        run: |
          cd backend
          pytest --cov=app --cov-report=term-missing app/tests

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build -t ai-businessos-backend:latest ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t ai-businessos-frontend:latest ./frontend
